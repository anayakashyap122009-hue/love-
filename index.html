<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Lakshita 💖</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:'Segoe UI',sans-serif;
text-align:center;

background:linear-gradient(135deg,#ff4e8a,#ff7ac3,#ffb6e6);
background-size:400% 400%;
animation:bgMove 10s infinite alternate;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

/* BIG KISS ENTRY */
.kiss{
position:absolute;
font-size:80vw;
top:-200px;
animation:drop 2s forwards;
}

@keyframes drop{
0%{top:-200px; transform:scale(0.5);}
100%{top:50%; transform:translateY(-50%) scale(1);}
}

/* MAIN TEXT */
.text{
opacity:0;
animation:fadeIn 2s forwards;
animation-delay:2s;
color:white;
z-index:10;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

h1{
font-size:4rem;
text-shadow:0 0 20px white;
}

p{
font-size:1.5rem;
margin-top:10px;
}

/* MUSIC BUTTON */
.btn{
margin-top:20px;
padding:12px 25px;
border-radius:30px;
background:rgba(255,255,255,0.2);
color:white;
cursor:pointer;
}

/* HEART EXPLOSION */
.heart{
position:absolute;
font-size:20px;
animation:explode 1s forwards;
}

@keyframes explode{
0%{
transform:scale(1);
opacity:1;
}
100%{
transform:translate(var(--x),var(--y)) scale(0);
opacity:0;
}
}

</style>
</head>

<body>

<div class="kiss">💋</div>

<div class="text">
<h1>I loveee youuu 💖</h1>
<p>Lakshita Sharma</p>

<div class="btn" onclick="toggleMusic()">🎵 Play Music</div>
</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mp3">
</audio>

<script>

/* MUSIC */
let music=document.getElementById("music");

function toggleMusic(){
if(music.paused){
music.play();
}else{
music.pause();
}
}

/* HEART EXPLOSION ON CLICK */
document.addEventListener("click",function(e){

for(let i=0;i<20;i++){

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💗";

let x=(Math.random()*200-100)+"px";
let y=(Math.random()*200-100)+"px";

heart.style.setProperty('--x',x);
heart.style.setProperty('--y',y);

heart.style.left=e.clientX+"px";
heart.style.top=e.clientY+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),1000);
}

});

</script>

</body>
</html>
