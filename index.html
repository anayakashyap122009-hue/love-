<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Magical Love 💖</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:'Segoe UI',sans-serif;
text-align:center;
background:radial-gradient(circle,#ff6fa5,#ff99cc,#ffcce6);
}

/* KISS */
.kiss{
position:absolute;
font-size:80vw;
top:-200px;
animation:drop 2s forwards;
}
@keyframes drop{
100%{top:50%; transform:translateY(-50%);}
}

/* TEXT */
.text{
opacity:0;
animation:fadeIn 2s forwards;
animation-delay:2s;
z-index:10;
}
@keyframes fadeIn{
to{opacity:1;}
}

/* WAVE TEXT */
.wave span{
display:inline-block;
font-size:3rem;
color:white;
animation:wave 2s infinite;
text-shadow:0 0 10px #fff,0 0 30px #ff1493;
}
@keyframes wave{
50%{transform:translateY(-15px);}
}
.wave span:nth-child(n){
animation-delay:calc(0.1s * var(--i));
}

/* HEART */
.heart{
position:absolute;
font-size:20px;
animation:explode 1s forwards;
}
@keyframes explode{
to{
transform:translate(var(--x),var(--y)) scale(0);
opacity:0;
}
}
</style>
</head>

<body>

<div class="kiss">💋</div>

<div class="text">
<h1 class="wave">
<span style="--i:1">I</span>
<span style="--i:2"> </span>
<span style="--i:3">l</span>
<span style="--i:4">o</span>
<span style="--i:5">v</span>
<span style="--i:6">e</span>
<span style="--i:7"> </span>
<span style="--i:8">y</span>
<span style="--i:9">o</span>
<span style="--i:10">u</span>
<span style="--i:11"> </span>
<span style="--i:12">L</span>
<span style="--i:13">a</span>
<span style="--i:14">k</span>
<span style="--i:15">s</span>
<span style="--i:16">h</span>
<span style="--i:17">i</span>
<span style="--i:18">t</span>
<span style="--i:19">a</span>
<span style="--i:20"> </span>
<span style="--i:21">S</span>
<span style="--i:22">h</span>
<span style="--i:23">a</span>
<span style="--i:24">r</span>
<span style="--i:25">m</span>
<span style="--i:26">a</span>
<span style="--i:27"> 💖</span>
</h1>
</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mp3">
</audio>

<script>
let music = document.getElementById("music");

/* WAIT UNTIL AUDIO READY → THEN SKIP */
music.addEventListener("loadedmetadata", () => {
    music.currentTime = 15;
});

/* FIRST CLICK = PLAY (AUTOPLAY TRICK) */
function startExperience(e){

    music.currentTime = 15;
    music.play();

    /* HEART EFFECT */
    for(let i=0;i<20;i++){
        let heart=document.createElement("div");
        heart.className="heart";
        heart.innerHTML="💗";

        let x=(Math.random()*200-100)+"px";
        let y=(Math.random()*200-100)+"px";

        heart.style.setProperty('--x',x);
        heart.style.setProperty('--y',y);

        heart.style.left=e.clientX+"px";
        heart.style.top=e.clientY+"px";

        document.body.appendChild(heart);
        setTimeout(()=>heart.remove(),1000);
    }

    document.removeEventListener("click", startExperience);
}

/* trigger */
document.addEventListener("click", startExperience);
document.addEventListener("touchstart", startExperience);

</script>

</body>
</html>
